<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta de Reservaciones · Kuyay</title>
    <!-- Estilos del teclado en pantalla (librería simple-keyboard) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/simple-keyboard@3/build/css/index.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Selector de idioma -->
    <div id="selector-idioma" class="selector-idioma"></div>

    <header class="hero">
      <h1>🏨 <span data-i18n="heroTitle"></span></h1>
      <p data-i18n="heroSubtitle"></p>
    </header>

    <main>
      <form id="formulario" class="tarjeta">
        <p class="ayuda" data-i18n="formAyuda"></p>

        <label for="numeroReserva" data-i18n="lblNumero"></label>
        <input
          type="text"
          id="numeroReserva"
          name="numeroReserva"
          data-i18n-ph="phNumero"
          autocomplete="off"
        />

        <label for="email" data-i18n="lblEmail"></label>
        <input
          type="email"
          id="email"
          name="email"
          data-i18n-ph="phEmail"
          autocomplete="off"
        />

        <details>
          <summary data-i18n="masOpciones"></summary>
          <label for="nombre" data-i18n="lblNombre"></label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            data-i18n-ph="phNombre"
            autocomplete="off"
          />

          <label for="telefono" data-i18n="lblTelefono"></label>
          <input
            type="text"
            id="telefono"
            name="telefono"
            data-i18n-ph="phTelefono"
            autocomplete="off"
          />
        </details>

        <button type="submit" id="botonBuscar" data-i18n="btnBuscar"></button>
      </form>

      <!-- Aquí aparecerá el resultado -->
      <section id="resultado" class="resultado oculto"></section>

      <!-- Consultar disponibilidad y reservar -->
      <section class="tarjeta disponibilidad">
        <h2>📅 <span data-i18n="dispTitulo"></span></h2>
        <p class="ayuda" data-i18n="dispAyuda"></p>
        <div class="botones-hostels">
          <a
            class="boton-hostel"
            href="https://engine.lobbypms.com/kuyay-ayllu-hostel"
            target="_blank"
            rel="noopener noreferrer"
            >🏠 Ayllu Hostel</a
          >
          <a
            class="boton-hostel"
            href="https://engine.lobbypms.com/kuyay-hostel-2"
            target="_blank"
            rel="noopener noreferrer"
            >🏠 Yachi Hostel</a
          >
        </div>
      </section>
    </main>

    <footer>
      <p data-i18n="footer"></p>
    </footer>

    <!-- Multi-idioma primero, para que el resto pueda usar I18N -->
    <script src="i18n.js"></script>
    <script src="app.js"></script>
    <script src="pagos.js"></script>
    <!-- Librería del teclado en pantalla + nuestra lógica -->
    <script src="https://cdn.jsdelivr.net/npm/simple-keyboard@3/build/index.js"></script>
    <script src="teclado.js"></script>
  </body>
</html>
